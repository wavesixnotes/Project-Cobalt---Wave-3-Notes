<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notepad</title>

  <!-- CSS FILE -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Notepad</h1>

    <textarea id="note" placeholder="Write your notes here..."></textarea>

    <div class="buttons">
      <button onclick="saveNote()">Save</button>
      <button onclick="clearNote()">Clear</button>
    </div>

    <p id="status"></p>
  </div>

  <!-- JAVASCRIPT FILE -->
  <script src="script.js"></script>
</body>
</html>
